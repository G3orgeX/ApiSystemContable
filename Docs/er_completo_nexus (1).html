
<div style="padding: 1rem 0;">
  <div id="erd"></div>
</div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const diagram = `erDiagram
  TipoMovimiento {
    SERIAL idTipoMovimiento PK
    VARCHAR nombre
    VARCHAR naturaleza
  }
  CierreMes {
    SERIAL idCierreMes PK
    INT mes
    INT anio
    DECIMAL total_debe
    DECIMAL total_haber
    DECIMAL saldo
    VARCHAR estado
    TIMESTAMP fecha_creacion
  }
  DetalleCierreMes {
    SERIAL idDetalle PK
    INT idCierreMes FK
    INT idTipoMovimiento FK
    INT idResumenTarjeta FK
    DATE fecha
    VARCHAR descripcion
    DECIMAL monto
    TIMESTAMP fecha_creacion
  }
  Tarjeta {
    SERIAL idTarjeta PK
    VARCHAR nombre
    VARCHAR titular
    VARCHAR tipo
    INT dia_cierre
    BOOLEAN activo
  }
  Consumo {
    SERIAL idConsumo PK
    INT idTarjeta FK
    DATE fecha_compra
    VARCHAR concepto
    DECIMAL monto_total
    INT cuotas
    DECIMAL valor_cuota
    BOOLEAN es_debito_automatico
  }
  ResumenTarjeta {
    SERIAL idResumen PK
    INT idTarjeta FK
    INT mes
    INT anio
    DECIMAL total_resumen
    VARCHAR estado
  }
  ResumenConsumo {
    SERIAL idResumenConsumo PK
    INT idResumen FK
    INT idConsumo FK
    INT numero_cuota
    DECIMAL monto_cuota
  }

  TipoMovimiento ||--o{ DetalleCierreMes : clasifica
  CierreMes ||--|{ DetalleCierreMes : contiene
  Tarjeta ||--o{ Consumo : tiene
  Tarjeta ||--o{ ResumenTarjeta : genera
  ResumenTarjeta ||--|{ ResumenConsumo : incluye
  Consumo ||--o{ ResumenConsumo : aparece_en
  ResumenTarjeta ||--o| DetalleCierreMes : es_egreso_en
`;
const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;
document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
